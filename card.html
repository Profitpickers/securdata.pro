<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Biglietto Digitale – SecurData.Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0a0e1a 0%, #0d1530 50%, #0a0e1a 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
  padding: 1rem;
}
.card {
  background: linear-gradient(135deg, #0d1530 0%, #111b3c 100%);
  border: 1px solid rgba(99,179,237,0.25);
  border-radius: 24px;
  padding: 2rem 1.75rem 1.5rem;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,179,237,0.1);
  text-align: center;
  position: relative;
}
.badge-powered {
  position: absolute;
  top: 1rem;
  right: 1rem;
  font-size: 0.62rem;
  color: #4a5568;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 4px;
  text-decoration: none;
}
.badge-powered img { width: 14px; height: 14px; border-radius: 3px; opacity: 0.5; }
/* Avatar */
.avatar-wrap {
  position: relative;
  width: 90px;
  height: 90px;
  margin: 0 auto 1rem;
}
.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: #63b3ed;
  border-right-color: rgba(99,179,237,0.3);
  animation: spin 3s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.avatar-initial {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a56db, #1e40af);
  border: 2px solid rgba(99,179,237,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 700;
  color: #fff;
}
/* Card text */
.name { font-size: 1.4rem; font-weight: 700; color: #e8f4ff; letter-spacing: 0.01em; margin-bottom: 0.25rem; }
.role { font-size: 0.75rem; color: #63b3ed; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 0.25rem; }
.company { font-size: 1rem; color: #90cdf4; font-weight: 600; }
.divider { width: 50px; height: 2px; background: linear-gradient(90deg, transparent, rgba(99,179,237,0.5), transparent); margin: 1rem auto; }
/* QR */
.qr-wrap { display: flex; justify-content: center; margin-bottom: 0.5rem; }
#qrcode { display: inline-block; }
#qrcode canvas, #qrcode img {
  border-radius: 12px;
  padding: 8px;
  background: #fff;
  display: block;
}
.qr-hint {
  font-size: 0.72rem;
  color: #4a5568;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-bottom: 1rem;
}
/* Buttons */
.btn-save {
  width: 100%;
  background: linear-gradient(135deg, #1a56db, #1e40af);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 0.8rem;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.18s, box-shadow 0.18s;
  margin-bottom: 1rem;
}
.btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(26,86,219,0.45); }
.btn-save:active { transform: translateY(0); }
/* Info list */
.info-list { text-align: left; margin-bottom: 1rem; }
.info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0.6rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.info-row:last-child { border-bottom: none; }
.info-icon {
  width: 32px; height: 32px;
  background: rgba(99,179,237,0.1);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.info-icon svg { width: 15px; height: 15px; }
.info-text { font-size: 0.87rem; color: #cbd5e0; word-break: break-all; }
.info-text a { color: #63b3ed; text-decoration: none; }
/* Share block */
.share-block {
  background: rgba(99,179,237,0.05);
  border: 1px solid rgba(99,179,237,0.2);
  border-radius: 14px;
  padding: 1rem;
  margin-bottom: 1rem;
}
.share-title {
  font-size: 0.78rem;
  color: #63b3ed;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
  text-align: left;
}
.share-desc {
  font-size: 0.75rem;
  color: #718096;
  margin-bottom: 0.6rem;
  text-align: left;
  line-height: 1.4;
}
.share-link-box {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(99,179,237,0.15);
  border-radius: 8px;
  padding: 0.5rem 0.8rem;
  font-size: 0.72rem;
  color: #63b3ed;
  word-break: break-all;
  margin-bottom: 0.6rem;
  text-align: left;
}
.share-btns { display: flex; gap: 0.5rem; }
.btn-copy {
  flex: 1;
  padding: 0.55rem;
  background: rgba(99,179,237,0.1);
  border: 1px solid rgba(99,179,237,0.3);
  border-radius: 8px;
  color: #63b3ed;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
}
.btn-wa {
  flex: 1;
  padding: 0.55rem;
  background: rgba(72,187,120,0.1);
  border: 1px solid rgba(72,187,120,0.3);
  border-radius: 8px;
  color: #68d391;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
}
/* Footer */
.card-footer {
  margin-top: 1rem;
  font-size: 0.65rem;
  color: #4a5568;
  text-align: center;
  line-height: 1.5;
}
.card-footer a { color: #4a5568; text-decoration: none; }
/* Toast */
.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1a56db;
  color: #fff;
  padding: 0.7rem 1.4rem;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* Pulse animation on save */
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(26,86,219,0.5); }
  70%  { box-shadow: 0 0 0 14px rgba(26,86,219,0); }
  100% { box-shadow: 0 0 0 0 rgba(26,86,219,0); }
}
.btn-save.pulse { animation: pulse 0.6s ease-out; }
</style>
</head>
<body>

<div class="card" id="mainCard">

  <a class="badge-powered" href="https://www.securdata.pro" target="_blank" title="Powered by SecurData.Pro">
    <img src="https://profitpickers.github.io/securdata.pro/logo-00-securdata-pro.svg" alt="SecurData.Pro">
    SecurData.Pro
  </a>

  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="avatar-initial" id="cardInitial">?</div>
  </div>

  <div class="name" id="cardNome">Nome Cognome</div>
  <div class="role" id="cardRuolo"></div>
  <div class="company" id="cardAzienda" style="display:none;"></div>

  <div class="divider"></div>

  <div class="qr-wrap">
    <div id="qrcode"></div>
  </div>
  <p class="qr-hint">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
    Inquadra per condividere il tuo contatto
  </p>

  <button class="btn-save" id="saveBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v13m0 0l-4-4m4 4l4-4M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/></svg>
    Salva Contatto
  </button>

  <div class="info-list">
    <div class="info-row" id="rowTel" style="display:none;">
      <div class="info-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#63b3ed" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.09 1.22 2 2 0 012.06 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
      </div>
      <div class="info-text" id="cardTel"></div>
    </div>
    <div class="info-row" id="rowEmail" style="display:none;">
      <div class="info-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#63b3ed" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="info-text"><a id="cardEmail" href="#"></a></div>
    </div>
    <div class="info-row" id="rowAttivita" style="display:none;">
      <div class="info-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#63b3ed" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
      </div>
      <div class="info-text" id="cardAttivita"></div>
    </div>
  </div>

  <!-- Referral share block -->
  <div class="share-block">
    <div class="share-title">🔗 Il tuo link di invito personale</div>
    <div class="share-desc">Condividi questo link: ogni persona che si iscrive tramite te entra nella tua rete di contatti!</div>
    <div class="share-link-box" id="shareLink"></div>
    <div class="share-btns">
      <button class="btn-copy" id="copyBtn">📋 Copia link</button>
      <button class="btn-wa" id="waBtn">💬 WhatsApp</button>
    </div>
  </div>

  <div class="card-footer">
    Biglietto digitale creato con <a href="https://www.securdata.pro" target="_blank">SecurData.Pro</a><br>
    Sicurezza Dati &amp; AI Integration
  </div>

</div>

<div class="toast" id="toast">✓ Fatto!</div>

<script>
/* ── Legge i parametri dall'URL ── */
function getParam(name) {
  return decodeURIComponent(new URLSearchParams(window.location.search).get(name) || '');
}

var nome     = getParam('nome')     || 'Nuovo Contatto';
var email    = getParam('email')    || '';
var tel      = getParam('tel')      || '';
var attivita = getParam('attivita') || '';
var settore  = getParam('settore')  || '';
// Sanitize via: allow only alphanumeric and dots (slug format)
var via      = (getParam('via') || nome.toLowerCase().replace(/\s+/g, '.').replace(/[^a-z0-9.]/g, '').substring(0, 30)).replace(/[^a-z0-9.\-_]/gi, '').substring(0, 50);

/* ── Iniziali per avatar ── */
var nameParts = nome.trim().split(/\s+/);
var initials  = nameParts.map(function(p) { return p.charAt(0).toUpperCase(); }).join('').substring(0, 2) || '?';

/* ── Popola la UI ── */
document.getElementById('cardInitial').textContent = initials;
document.getElementById('cardNome').textContent    = nome;
document.getElementById('cardRuolo').textContent   = settore || attivita || 'Membro · SecurData.Pro';
document.title = nome + ' – Biglietto Digitale';

if (attivita) {
  document.getElementById('cardAzienda').textContent = attivita;
  document.getElementById('cardAzienda').style.display = 'block';
}
if (tel) {
  document.getElementById('cardTel').textContent = tel;
  document.getElementById('rowTel').style.display = 'flex';
}
if (email) {
  // Validate email format before using in mailto: href to prevent URL injection
  var emailClean = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) ? email : '';
  document.getElementById('cardEmail').textContent = emailClean || email;
  if (emailClean) {
    document.getElementById('cardEmail').href = 'mailto:' + emailClean;
  } else {
    document.getElementById('cardEmail').removeAttribute('href');
  }
  document.getElementById('rowEmail').style.display = 'flex';
}
if (attivita) {
  document.getElementById('cardAttivita').textContent = attivita;
  document.getElementById('rowAttivita').style.display = 'flex';
}

/* ── QR Code ──
   Il QR punta al biglietto del proprietario con il tag ?via=slug del lead:
   chiunque scansioni il QR arriverà al biglietto con il referral attivo.    */
var ownerCardBase = window.location.origin + '/vito_qrcode_contact.html';
var shareUrl = ownerCardBase + '?via=' + encodeURIComponent(via);

new QRCode(document.getElementById('qrcode'), {
  text: shareUrl,
  width: 180,
  height: 180,
  colorDark: '#0d1530',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.M
});

/* ── Blocco condivisione ── */
document.getElementById('shareLink').textContent = shareUrl;

document.getElementById('copyBtn').onclick = function() {
  var btn = this;
  navigator.clipboard.writeText(shareUrl).then(function() {
    showToast('✅ Link copiato!');
    btn.textContent = '✅ Copiato!';
    setTimeout(function() { btn.textContent = '📋 Copia link'; }, 2000);
  }).catch(function() {
    var tmp = document.createElement('textarea');
    tmp.value = shareUrl;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    showToast('✅ Link copiato!');
    btn.textContent = '✅ Copiato!';
    setTimeout(function() { btn.textContent = '📋 Copia link'; }, 2000);
  });
};

document.getElementById('waBtn').onclick = function() {
  var msg = 'Ciao! Ho appena creato il mio biglietto digitale con SecurData.Pro 🎴\nTi invito a scoprire le risorse gratuite su sicurezza dati e AI: ' + shareUrl;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
};

/* ── Salva contatto (vCard) ── */
document.getElementById('saveBtn').addEventListener('click', function() {
  var parts   = nome.trim().split(/\s+/);
  var cognome = parts.length > 1 ? parts[parts.length - 1] : '';
  var primo   = parts.length > 1 ? parts.slice(0, -1).join(' ') : parts[0];

  var lines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:' + nome,
    'N:' + cognome + ';' + primo + ';;;'
  ];
  if (tel)      lines.push('TEL;TYPE=CELL,VOICE:' + tel.replace(/\s/g, ''));
  if (email)    lines.push('EMAIL;TYPE=WORK:' + email);
  if (attivita) lines.push('ORG:' + attivita);
  if (settore)  lines.push('TITLE:' + settore);
  lines.push('URL:' + shareUrl);
  lines.push('END:VCARD');

  var vcf  = lines.join('\r\n');
  var blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = nome.replace(/\s+/g, '_') + '.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  this.classList.add('pulse');
  var self = this;
  setTimeout(function() { self.classList.remove('pulse'); }, 700);
  showToast('✓ Contatto salvato!');
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
